aid: detectlanguage
name: DetectLanguage
description: >-
  DetectLanguage is a language detection REST API that analyzes text samples
  and returns the identified language along with a confidence score. Supporting
  216 languages, the API enables developers to identify languages from brief
  phrases to full documents, with batch processing support for multiple texts in
  a single request. It offers SDKs for Ruby, Python, Node.js, Go, Java, PHP,
  and .NET, making integration straightforward across technology stacks.
